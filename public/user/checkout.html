<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Ceramico</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cart-checkout.css">

    <!-- SweetAlert2 Injection -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/user-protected.js"></script>
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top bg-white border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold" href="home.html">CERAMICO</a>
            <div class="ms-auto">
                <a href="cart.html" class="text-dark text-decoration-none small fw-bold">BACK TO CART</a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="container mb-5" style="margin-top: 100px;">
        <div id="checkoutFormWrapper">
            <div class="row g-4">
                
                <!-- Left Column: Address & Payment -->
                <div class="col-lg-7">
                    
                    <!-- 1. Delivery Address -->
                    <div class="checkout-card mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h5 class="fw-bold mb-0 fs-6 text-uppercase letter-spacing-1">
                                <i class="bi bi-geo-alt text-dark me-2"></i> Delivery Address
                            </h5>
                            <a href="add-address.html?returnTo=checkout" class="btn btn-outline-dark btn-sm fw-bold px-3">
                                <i class="bi bi-plus"></i> ADD NEW
                            </a>
                        </div>
                        <div id="deliveryAddressesContainer">
                            <div class="text-center py-4">
                                <span class="spinner-border spinner-border-sm text-secondary"></span>
                            </div>
                        </div>
                    </div>

                    <!-- 2. Payment Method -->
                    <div class="checkout-card">
                        <h5 class="fw-bold mb-4 fs-6 text-uppercase letter-spacing-1">
                            <i class="bi bi-credit-card text-dark me-2"></i> Payment Method
                        </h5>

                        <div class="payment-card-wrap mb-3 border rounded p-3">
                            <div class="form-check d-flex justify-content-between align-items-center w-100 m-0 p-0 ps-4">
                                <div>
                                    <input class="form-check-input me-3 ms-0" type="radio" name="paymentMethod" id="razorpay" value="razorpay">
                                    <label class="form-check-label fw-bold" for="razorpay">Pay Online (Razorpay)</label>
                                </div>
                                <div class="d-flex gap-2 text-primary fs-5">
                                    <i class="bi bi-credit-card"></i>
                                    <i class="bi bi-wallet2"></i>
                                </div>
                            </div>
                        </div>

                        <div class="payment-card-wrap mb-3 border rounded p-3 active border-primary">
                            <div class="form-check d-flex justify-content-between align-items-center w-100 m-0 p-0 ps-4">
                                <div>
                                    <input class="form-check-input me-3 ms-0" type="radio" name="paymentMethod" id="cod" value="cod" checked>
                                    <label class="form-check-label fw-bold" for="cod">Cash on Delivery</label>
                                </div>
                                <i class="bi bi-cash-stack text-success fs-5"></i>
                            </div>
                        </div>

                        <div class="payment-card-wrap border rounded p-3 bg-light opacity-75">
                            <div class="form-check d-flex justify-content-between align-items-center w-100 m-0 p-0 ps-4">
                                <div>
                                    <input class="form-check-input me-3 ms-0" type="radio" name="paymentMethod" id="wallet" value="wallet" disabled>
                                    <label class="form-check-label fw-bold" for="wallet">Wallet Balance</label>
                                </div>
                                <span class="badge bg-secondary px-2" id="walletBalanceBadge">₹0.00</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Column: Order Summary -->
                <div class="col-lg-5">
                    <div id="orderSummaryContainer" class="summary-container sticky-summary shadow-sm border">
                        <div class="text-center py-5">
                            <div class="spinner-border text-dark mb-2" role="status"></div>
                            <div class="small fw-bold text-uppercase">Preparing Summary...</div>
                        </div>
                    </div>
                    
                    <!-- Hidden container for Modal/Coupon List if needed -->
                    <div id="availableCouponsModalContainer"></div>
                </div>

            </div>
        </div>
    </div>

    <!-- Available Coupons Modal -->
    <div class="modal fade" id="couponsModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 15px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-uppercase">Available Offers</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="couponsModalBody">
                    <!-- JS WILL INJECT OFFERS HERE -->
                </div>
            </div>
        </div>
    </div>

    <footer class="py-4 bg-white border-top mt-5">
        <div class="container text-center text-muted small fw-bold">
            &copy; 2026 CERAMICO. PREMIUM ARTISAN POTTERY.
        </div>
    </footer>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/checkout.js"></script>
</body>

</html>
