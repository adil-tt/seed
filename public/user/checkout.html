<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Ceramico</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cart-checkout.css">

    <!-- SweetAlert2 Injection -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    

</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="home.html">CERAMICO</a>
            <div class="ms-auto">
                <a href="cart.html" class="text-dark me-2">Back to Cart</a>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <div class="bg-light py-5 mb-5 mt-5">
        <div class="container text-center">
            <h1 class="display-4">Checkout</h1>
        </div>
    </div>

    <!-- Checkout Content -->
    <div class="container mb-5 mt-4">
        <style>
            .checkout-card {
                background: #fff;
                border-radius: 12px;
                box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
                padding: 24px;
                margin-bottom: 24px;
                border: 1px solid #f1f1f1;
            }

            .sticky-summary {
                position: sticky;
                top: 90px;
                z-index: 10;
            }

            .checkout-card.dark-header {
                padding: 0;
                overflow: hidden;
            }

            .dark-header-title {
                background-color: #212529;
                color: white;
                padding: 18px 24px;
                margin-bottom: 0;
                font-size: 1.1rem;
                display: flex;
                align-items: center;
                border-radius: 12px 12px 0 0;
            }

            .dark-header-body {
                padding: 24px;
            }

            .btn-place-order {
                background-color: #2bca63;
                color: white;
                font-weight: 600;
                border-radius: 6px;
                padding: 12px;
                border: none;
                transition: background 0.3s;
                font-size: 1.05rem;
            }

            .btn-place-order:hover {
                background-color: #27ae56;
                color: white;
            }

            .payment-card-wrap {
                border: 1px solid #eee;
                border-radius: 8px;
                padding: 16px;
                margin-bottom: 12px;
            }

            .payment-card-wrap.active {
                border-color: #e2e8f0;
                /* Background is kept white to match clean design */
            }

            .payment-card-wrap .form-check-input:checked {
                background-color: #0d6efd;
                border-color: #0d6efd;
            }
        </style>
        <div id="checkoutFormWrapper">
            <div class="row">
                <!-- Left Column (65%) -> col-lg-8. Order 2 on mobile, 1 on LG -->
                <div class="col-lg-7 order-2 order-lg-1">

                    <!-- 1. Delivery Address Section -->
                    <div class="checkout-card">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="fw-bold mb-0 fs-6"><i class="bi bi-geo-alt-fill text-warning me-2"></i> Delivery
                                Address</h5>
                            <a href="add-address.html?returnTo=checkout" class="btn btn-outline-secondary btn-sm"><i
                                    class="bi bi-plus"></i>
                                Add New</a>
                        </div>
                        <div id="deliveryAddressesContainer">
                            <!-- JS WILL INJECT ADDRESS HERE -->
                            <div class="text-center text-muted p-3 border rounded border-dashed">
                                <span class="spinner-border spinner-border-sm me-2" role="status"
                                    aria-hidden="true"></span> Loading addresses...
                            </div>
                        </div>
                    </div>



                    <!-- 3. Payment Method -->
                    <div class="checkout-card">
                        <h5 class="fw-bold mb-4 fs-6"><i class="bi bi-credit-card-2-front text-primary me-2"></i>
                            Payment Method</h5>

                        <div class="payment-card-wrap">
                            <div
                                class="form-check d-flex justify-content-between align-items-center w-100 m-0 p-0 ps-4">
                                <div>
                                    <input class="form-check-input me-3 ms-0" type="radio" name="paymentMethod"
                                        id="razorpay" value="razorpay">
                                    <label class="form-check-label text-dark" for="razorpay">
                                        Pay Online (Razorpay)
                                    </label>
                                </div>
                                <div class="d-flex align-items-center gap-2">
                                    <!-- Use small images for credit card logos as visual aid, or generic text icons -->
                                    <i class="bi bi-credit-card text-primary px-1"></i>
                                    <i class="bi bi-google-play px-1"></i>
                                </div>
                            </div>
                        </div>

                        <div class="payment-card-wrap active border-primary bg-light bg-opacity-10 border-opacity-50">
                            <div
                                class="form-check d-flex justify-content-between align-items-center w-100 m-0 p-0 ps-4">
                                <div>
                                    <input class="form-check-input me-3 ms-0" type="radio" name="paymentMethod" id="cod"
                                        value="cod" checked>
                                    <label class="form-check-label text-dark fw-medium" for="cod">
                                        Cash on Delivery
                                    </label>
                                </div>
                                <i class="bi bi-cash-stack text-success fs-5"></i>
                            </div>
                        </div>

                        <div class="payment-card-wrap bg-light border-0">
                            <div
                                class="form-check d-flex justify-content-between align-items-center w-100 m-0 p-0 ps-4">
                                <div>
                                    <input class="form-check-input me-3 ms-0 bg-secondary" type="radio"
                                        name="paymentMethod" id="wallet" value="wallet" disabled>
                                    <label class="form-check-label text-dark opacity-75" for="wallet">
                                        Wallet Balance
                                    </label>
                                </div>
                                <span class="badge bg-secondary rounded px-2 opacity-75"
                                    id="walletBalanceBadge">₹0.00</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Column (35%) -> col-lg-5. Order 1 on mobile, 2 on LG -->
                <div class="col-lg-5 order-1 order-lg-2 mb-4">
                    <div class="checkout-card dark-header sticky-summary">
                        <h4 class="dark-header-title mb-0"><i class="bi bi-bag-check me-2"></i> Order Summary</h4>

                        <div id="orderSummaryContainer" class="dark-header-body">
                            <div class="text-center py-5">
                                <span class="spinner-border text-primary spinner-border-sm" role="status"
                                    aria-hidden="true"></span>
                                <span class="ms-2">Loading Order Summary...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container text-center text-white-50">
            <p>&copy; 2026 Ceramico. Same footer as other pages.</p>
        </div>
    </footer>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/checkout.js"></script>
</body>

</html>
