<!DOCTYPE html>
<html lang="en">

<head>
    <script src="js/block-admin.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Dinner Plate - Ceramico</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/single-product.css">

    <!-- SweetAlert2 Injection -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    

</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="home.html">CERAMICO</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="product.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
                <div class="navbar-icons">
                    <a href="search.html" class="icon-link"><i class="bi bi-search"></i></a>
                    <a href="wishlist.html" class="icon-link"><i class="bi bi-heart"></i></a>
                    <a href="cart.html" class="icon-link"><i class="bi bi-bag"></i></a>
                    <a href="account.html" class="icon-link"><i class="bi bi-person"></i></a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Breadcrumbs -->
    <div class="container mt-5 pt-5 mb-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="home.html">Home</a></li>
                <li class="breadcrumb-item"><a href="product.html">Shop</a></li>
                <li class="breadcrumb-item"><a href="product.html">Plates</a></li>
                <li class="breadcrumb-item active" aria-current="page">Minimalist Dinner Plate</li>
            </ol>
        </nav>
    </div>

    <!-- Product Details -->
    <section class="container mb-5">
        <div class="row">
            <!-- Gallery -->
            <div class="col-lg-6 mb-4" id="product-images">
                <div class="product-gallery-main skeleton skeleton-img w-100 rounded" style="min-height: 400px; background-color: #eee;"></div>
            </div>

            <!-- Info -->
            <div class="col-lg-6">
                <h1 class="mb-2 skeleton skeleton-text" id="product-name" style="height: 3rem; width: 80%;"></h1>
                <div class="mb-3 skeleton skeleton-text" style="width: 30%; height: 1.5rem;" id="product-rating-placeholder"></div>
                <div class="product-price-large skeleton skeleton-text" id="product-price" style="height: 2.5rem; width: 40%; margin-bottom: 20px;"></div>
                <p class="text-secondary mb-4 skeleton skeleton-text" id="product-description" style="height: 4rem; width: 100%;"></p>



                <div class="d-flex flex-wrap align-items-center gap-3 mb-4">
                    <div class="quantity-control">
                        <button class="quantity-btn" onclick="decreaseQty()">-</button>
                        <input type="number" id="quantity" class="quantity-input" value="1" min="1">
                        <button class="quantity-btn" onclick="increaseQty()">+</button>
                    </div>
                    <button id="single-add-cart" class="btn btn-primary btn-lg flex-grow-1 add-to-cart"><i
                            class="bi bi-bag-plus me-2"></i> Add to Cart</button>
                    <button id="single-add-wishlist" class="btn btn-outline-secondary btn-lg add-to-wishlist"><i
                            class="bi bi-heart"></i></button>
                </div>

                <ul class="list-unstyled text-secondary small">
                    <li class="skeleton skeleton-text" style="width: 50%;"><span class="fw-bold text-dark">SKU:</span> <span id="product-sku"></span></li>
                    <li class="skeleton skeleton-text" style="width: 70%; margin-top: 5px;"><span class="fw-bold text-dark">Category:</span> <span id="product-category"></span></li>
                    <li class="skeleton skeleton-text" style="width: 60%; margin-top: 5px;"><span class="fw-bold text-dark">Tags:</span> <span id="product-tags"></span></li>
                </ul>
            </div>
        </div>
    </section>

    <!-- Tabs: Description & Reviews -->
    <section class="container mb-5">
        <ul class="nav nav-tabs mb-4" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="desc-tab" data-bs-toggle="tab" data-bs-target="#desc" type="button"
                    role="tab">Description</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="reviews-tab" data-bs-toggle="tab" data-bs-target="#reviews" type="button"
                    role="tab">Reviews (12)</button>
            </li>
        </ul>
        <div class="tab-content" id="myTabContent">
            <div class="tab-pane fade show active" id="desc" role="tabpanel">
                <div id="desc-placeholder" class="skeleton skeleton-text" style="height: 6rem; width: 100%;"></div>
            </div>
            <div class="tab-pane fade" id="reviews" role="tabpanel">
                <div class="review-item d-flex">
                    <div class="review-avatar skeleton" style="border-radius: 50%; width: 50px; height: 50px;"></div>
                    <div class="w-100 ms-3">
                        <div class="skeleton skeleton-text" style="width: 30%;"></div>
                        <div class="skeleton skeleton-text" style="width: 80%; height: 2rem;"></div>
                    </div>
                </div>
                <!-- Add Review Form -->
                <div class="mt-4">
                    <h5>Write a Review</h5>
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Rating</label>
                            <select class="form-select w-auto">
                                <option>5 Stars</option>
                                <option>4 Stars</option>
                                <option>3 Stars</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <textarea class="form-control" rows="3" placeholder="Your review..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Submit Review</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Related Products -->
    <section class="container mb-5">
        <h3 class="mb-4">Related Products</h3>
        <div class="row" id="related-products">
            <!-- Product 1 -->
            <div class="col-md-3 col-6">
                <div class="product-card">
                    <div class="product-img-wrapper">
                        <img src="images/ceramic-cup.jpg" class="product-img" alt="Product">
                        <div class="product-actions">
                            <a href="#" class="btn btn-sm btn-dark"><i class="bi bi-cart-plus"></i> Add</a>
                            <a href="single-product.html" class="btn btn-sm btn-outline-dark"><i class="bi bi-eye"></i>
                                View</a>
                        </div>
                    </div>
                    <div class="product-info">
                        <h3 class="product-title"><a href="single-product.html">Side Plate</a></h3>
                        <div class="product-price">₹18.00</div>
                    </div>
                </div>
            </div>
            <!-- More related... -->
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container text-center text-white-50">
            <p>&copy; 2026 Ceramico. Same footer as other pages.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/wishlist.js"></script>
    <script src="js/single-product.js"></script>
</body>

</html>
