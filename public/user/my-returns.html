<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Returns - Ceramico</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/account.css">

    <!-- SweetAlert2 Injection -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="home.html">CERAMICO</a>
            <div class="ms-auto">
                <a href="account.html" class="text-dark">Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5 mb-5">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-lg-3 mb-4">
                <div class="account-sidebar">
                    <div class="user-profile-summary">
                        <div class="user-avatar">
                            <i class="bi bi-person"></i>
                        </div>
                        <h5 class="mb-1">John Doe</h5>
                        <small class="text-muted">john.doe@example.com</small>
                        <div class="mt-3">
                            <a href="login.html" class="btn btn-outline-danger btn-sm w-100">Logout</a>
                        </div>
                    </div>
                    <nav class="nav flex-column sidebar-nav custom-sidebar-nav">
                        <div class="sidebar-section-title">
                            <i class="bi bi-person-fill"></i> MANAGE ACCOUNT
                        </div>
                        <a class="nav-link" href="account-settings.html">My Profile</a>
                        <a class="nav-link" href="address-book.html">Address Book</a>
                        <a class="nav-link" href="payment-methods.html">Wallet</a>

                        <div class="nav-divider"></div>

                        <div class="sidebar-section-title">
                            <i class="bi bi-box-seam-fill"></i> ORDERS HISTORY
                        </div>
                        <a class="nav-link" href="my-orders.html">My Orders</a>
                        <a class="nav-link active" href="my-returns.html">My Returns</a>
                        <a class="nav-link" href="my-cancellations.html">My Cancellations</a>
                    </nav>
                </div>
            </div>

            <!-- Content -->
            <div class="col-lg-9 dashboard-content">
                <div class="mb-4">
                    <a href="account.html" class="text-decoration-none text-muted mb-2 d-inline-block"><i
                            class="bi bi-arrow-left"></i> Back to Account</a>
                    <h3>My Returns</h3>
                    <p class="text-muted">Track all the products you have returned.</p>
                </div>

                <!-- Dynamic Returns Container -->
                <div id="returnsContainer">
                    <div class="text-center py-5">
                        <span class="spinner-border spinner-border-sm text-primary" role="status"
                            aria-hidden="true"></span> Loading returns...
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container text-center text-white-50">
            <p>&copy; 2026 Ceramico.</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const token = sessionStorage.getItem("token") || localStorage.getItem("token");
            if (!token) {
                window.location.href = "login.html";
                return;
            }

            try {
                const response = await fetch("http://localhost:5000/api/orders/my", {
                    method: "GET",
                    headers: { "Authorization": `Bearer ${token}` }
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.message || "Failed to fetch orders");

                if (data.user) {
                    const userNameEl = document.querySelector(".user-profile-summary h5");
                    const userEmailEl = document.querySelector(".user-profile-summary small");
                    if (userNameEl) userNameEl.innerText = data.user.name;
                    if (userEmailEl) userEmailEl.innerText = data.user.email;
                }

                const returnsContainer = document.getElementById("returnsContainer");
                const returnedOrders = (data.orders || []).filter(o => o.deliveryStatus === "Returned");
                
                if (returnedOrders.length === 0) {
                    returnsContainer.innerHTML = `
                        <div class="text-center py-5 bg-white rounded shadow-sm">
                            <i class="bi bi-arrow-return-left display-1 text-muted opacity-50 mb-3"></i>
                            <h5 class="text-secondary">You have no active returns.</h5>
                        </div>
                    `;
                    return;
                }

                let returnsHTML = "";
                returnedOrders.forEach(order => {
                    const orderDate = new Date(order.createdAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
                    
                    let productsHTML = `<div class="d-flex gap-3 overflow-auto py-2 mb-3">`;
                    if (order.products && order.products.length > 0) {
                        order.products.forEach(item => {
                            const imgSrc = item.image && !item.image.startsWith('http') && !item.image.startsWith('images/')
                                ? `http://localhost:5000/uploads/${item.image}`
                                : (item.image || 'images/placeholder.jpg');

                            productsHTML += `
                                <div class="border rounded p-2 text-center" style="min-width: 120px; opacity: 0.8;">
                                    <img src="${imgSrc}" alt="${item.name}" class="img-fluid rounded mb-2" style="height: 60px; object-fit: cover; filter: grayscale(100%);">
                                    <p class="small mb-0 text-truncate" style="max-width: 100px;" title="${item.name}">${item.name}</p>
                                    <small class="text-muted">Qty: ${item.quantity}</small>
                                </div>
                            `;
                        });
                    }
                    productsHTML += `</div>`;

                    returnsHTML += `
                        <div class="order-item-card bg-white mb-4 rounded shadow-sm p-4 border-start border-4 border-primary">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div>
                                    <span class="fw-bold d-block">Original Order #${order._id.substring(0, 8).toUpperCase()}</span>
                                    <small class="text-muted">Purchased on ${orderDate}</small>
                                </div>
                                <div class="text-end">
                                    <span class="badge bg-primary fs-6">Refunded To Wallet: ₹${order.totalAmount}</span>
                                </div>
                            </div>
                            
                            ${productsHTML}
                            
                            <div class="bg-light p-3 rounded mt-3">
                                <strong>Return Reason:</strong> ${order.returnReason || 'Not Specified'}<br>
                                <span class="text-muted small">${order.returnDetails || 'No additional details provided.'}</span>
                            </div>
                        </div>
                    `;
                });

                returnsContainer.innerHTML = returnsHTML;

            } catch (error) {
                console.error("Error loading returns:", error);
                document.getElementById("returnsContainer").innerHTML = `
                    <div class="alert alert-danger text-center">
                        Could not load your return history.<br><small>${error.message}</small>
                    </div>
                `;
            }
        });
    </script>
    <script src="js/auth-sync.js"></script>
</body>

</html>
